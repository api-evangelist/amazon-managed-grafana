naftiko: "1.0.0-alpha1"
info:
  label: "Amazon Managed Grafana"
  description: "API for managing Grafana workspaces, users, and API keys on Amazon Managed Grafana."
  tags:
    - Amazon
    - Grafana
    - Dashboards
    - Monitoring
    - Observability
  created: "2026-04-19"
  modified: "2026-04-19"
binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION
capability:
  consumes:
    - type: http
      namespace: managed-grafana
      baseUri: https://grafana.amazonaws.com
      description: "Amazon Managed Grafana REST API"
      authentication:
        type: apikey
        key: Authorization
        value: "AWS4-HMAC-SHA256 {{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: workspaces
          path: /workspaces
          description: "Manage Grafana workspaces"
          operations:
            - name: list-workspaces
              method: GET
              description: "List all Grafana workspaces"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-workspace
              method: POST
              description: "Create a new Grafana workspace"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: describe-workspace
              method: GET
              description: "Get workspace details"
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "Workspace ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-workspace
              method: PUT
              description: "Update workspace configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-workspace
              method: DELETE
              description: "Delete a workspace"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: api-keys
          path: /workspaces/{workspaceId}/apikeys
          description: "Manage workspace API keys"
          operations:
            - name: create-workspace-api-key
              method: POST
              description: "Create a workspace API key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-workspace-api-keys
              method: GET
              description: "List workspace API keys"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
  exposes:
    - type: rest
      port: 8100
      namespace: managed-grafana-api
      resources:
        - path: /v1/workspaces
          name: workspaces
          description: "Grafana workspaces"
          operations:
            - method: GET
              name: list-workspaces
              description: "List workspaces"
              call: "managed-grafana.list-workspaces"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9100
      namespace: managed-grafana-mcp
      transport: http
      tools:
        - name: list-grafana-workspaces
          description: "List all Amazon Managed Grafana workspaces"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "managed-grafana.list-workspaces"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-grafana-workspace
          description: "Create a new Grafana workspace"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "managed-grafana.create-workspace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-grafana-workspace
          description: "Get details of a Grafana workspace"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "managed-grafana.describe-workspace"
          with:
            workspaceId: "tools.workspaceId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-workspace-api-key
          description: "Create an API key for Grafana workspace access"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "managed-grafana.create-workspace-api-key"
          outputParameters:
            - type: object
              mapping: "$."
