apis:
  - aid: amazon-managed-grafana:amazon-managed-grafana-api
    name: Amazon Managed Grafana API
    description: >-
      The Amazon Managed Grafana API provides programmatic access to create
      and manage Grafana workspaces, users, SAML configurations, and workspace
      API keys for managed Grafana deployments. Covers workspace lifecycle
      management, authentication configuration, license association, and
      access control across all managed Grafana resources.
