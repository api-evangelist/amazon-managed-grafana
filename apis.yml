aid: amazon-managed-grafana
name: Amazon Managed Grafana
description: >-
  Amazon Managed Grafana is a fully managed service for open source Grafana
  developed in collaboration with Grafana Labs. It enables interactive data
  visualizations and dashboards for operational metrics, logs, and traces from
  multiple sources including AWS services, third-party ISVs, and on-premises data.
